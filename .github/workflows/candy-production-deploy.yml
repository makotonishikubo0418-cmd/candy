name: CANDY Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "HP/**"
      - "!HP/codex/**"
      - "!HP/log/**"
      - "!HP/Text_area_data/**"
      - "!HP/Text_blog_data/**"
      - "!HP/Text_hotel_data/**"
      - "!HP/.well-known/**"
      - "!HP/.git/**"
      - "!HP/.github/**"
      - "!HP/.vscode/**"
      - "!HP/AGENTS.md"
      - "!HP/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candy-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment script
        run: |
          python3 -m py_compile .github/scripts/candy_ftp_deploy.py
          python3 .github/scripts/candy_ftp_deploy.py --self-test

      - name: Deploy changed HP files
        if: github.event_name == 'push'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "${{ github.event.before }}" \
            --after "${{ github.sha }}"

      - name: Preview previous commit difference
        if: github.event_name == 'workflow_dispatch'
        run: |
          BEFORE="$(git rev-parse HEAD^)"
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "$BEFORE" \
            --after "${{ github.sha }}" \
            --dry-run
