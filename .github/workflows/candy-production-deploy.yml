name: CANDY Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "HP/**"
      - ".github/workflows/candy-production-deploy.yml"
      - ".github/scripts/candy_ftp_deploy.py"
      - ".github/scripts/test_candy_ftp_deploy.py"
      - ".github/scripts/candy_release_check.py"
      - "!HP/codex/**"
      - "!HP/**/*.md"
      - "!HP/AGENTS.md"
      - "!HP/Text_area_data/**"
      - "!HP/Text_blog_data/**"
      - "!HP/Text_hotel_data/**"
  workflow_dispatch:
    inputs:
      operation:
        description: "preview first; deploy only with the approved preview values"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - deploy
      before_sha:
        description: "40-character base commit SHA"
        required: true
        type: string
      after_sha:
        description: "40-character target commit SHA"
        required: true
        type: string
      expected_file_count:
        description: "Exact deployable count printed by preview (deploy only)"
        required: true
        default: "0"
        type: string
      approved_plan_token:
        description: "Exact PLAN_TOKEN printed by preview (deploy only)"
        required: false
        default: ""
        type: string
      confirmation:
        description: "For deploy, enter DEPLOY-CANDY-PRODUCTION"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: candy-production-deploy
  cancel-in-progress: false

jobs:
  preview:
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'preview'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out the exact target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.after_sha }}
          fetch-depth: 0

      - name: Validate deployment script
        run: |
          python3 -m py_compile .github/scripts/candy_ftp_deploy.py .github/scripts/candy_release_check.py
          python3 .github/scripts/candy_ftp_deploy.py --self-test
          python3 .github/scripts/test_candy_ftp_deploy.py

      - name: Preview exact production plan without FTP
        env:
          BEFORE_SHA: ${{ inputs.before_sha }}
          AFTER_SHA: ${{ inputs.after_sha }}
        run: |
          set -o pipefail
          test "$(git rev-parse HEAD)" = "$AFTER_SHA"
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA" \
            --dry-run | tee deploy-preview.txt
          cat deploy-preview.txt >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.event_name == 'push' || inputs.operation == 'deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: candy-production

    steps:
      - name: Check out the exact approved target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || inputs.after_sha }}
          fetch-depth: 0

      - name: Validate deployment script
        run: |
          python3 -m py_compile .github/scripts/candy_ftp_deploy.py .github/scripts/candy_release_check.py
          python3 .github/scripts/candy_ftp_deploy.py --self-test
          python3 .github/scripts/test_candy_ftp_deploy.py

      - name: Build exact deployment plan without FTP
        id: plan
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || inputs.before_sha }}
          AFTER_SHA: ${{ github.event_name == 'push' && github.sha || inputs.after_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$AFTER_SHA"
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA" \
            --dry-run | tee deploy-plan.txt
          cat deploy-plan.txt >> "$GITHUB_STEP_SUMMARY"
          count="$(sed -n 's/^Deployable file count: //p' deploy-plan.txt | tail -1)"
          token="$(sed -n 's/^PLAN_TOKEN: //p' deploy-plan.txt | tail -1)"
          test -n "$count"
          test -n "$token"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Select automatic or manual approval values
        id: approval
        env:
          EVENT_NAME: ${{ github.event_name }}
          PLAN_COUNT: ${{ steps.plan.outputs.count }}
          PLAN_TOKEN: ${{ steps.plan.outputs.token }}
          MANUAL_COUNT: ${{ inputs.expected_file_count }}
          MANUAL_TOKEN: ${{ inputs.approved_plan_token }}
          MANUAL_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            echo "count=$PLAN_COUNT" >> "$GITHUB_OUTPUT"
            echo "token=$PLAN_TOKEN" >> "$GITHUB_OUTPUT"
            echo "confirmation=DEPLOY-CANDY-PRODUCTION" >> "$GITHUB_OUTPUT"
          else
            echo "count=$MANUAL_COUNT" >> "$GITHUB_OUTPUT"
            echo "token=$MANUAL_TOKEN" >> "$GITHUB_OUTPUT"
            echo "confirmation=$MANUAL_CONFIRMATION" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint every deployable PHP file before FTP
        if: steps.plan.outputs.count != '0'
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || inputs.before_sha }}
          AFTER_SHA: ${{ github.event_name == 'push' && github.sha || inputs.after_sha }}
        run: |
          set -euo pipefail
          command -v php
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA" \
            --lint-php

      - name: Validate count, limits, and plan token without FTP
        if: steps.plan.outputs.count != '0'
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || inputs.before_sha }}
          AFTER_SHA: ${{ github.event_name == 'push' && github.sha || inputs.after_sha }}
          EXPECTED_FILE_COUNT: ${{ steps.approval.outputs.count }}
          APPROVED_PLAN_TOKEN: ${{ steps.approval.outputs.token }}
          PRODUCTION_CONFIRMATION: ${{ steps.approval.outputs.confirmation }}
        run: |
          set -o pipefail
          test "$(git rev-parse HEAD)" = "$AFTER_SHA"
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA" \
            --expected-file-count "$EXPECTED_FILE_COUNT" \
            --approved-plan-token "$APPROVED_PLAN_TOKEN" \
            --confirm-production "$PRODUCTION_CONFIRMATION" \
            --verify-approval | tee deploy-approval.txt
          cat deploy-approval.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy only the approved files
        if: steps.plan.outputs.count != '0'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || inputs.before_sha }}
          AFTER_SHA: ${{ github.event_name == 'push' && github.sha || inputs.after_sha }}
          EXPECTED_FILE_COUNT: ${{ steps.approval.outputs.count }}
          APPROVED_PLAN_TOKEN: ${{ steps.approval.outputs.token }}
          PRODUCTION_CONFIRMATION: ${{ steps.approval.outputs.confirmation }}
        run: |
          set -o pipefail
          python3 .github/scripts/candy_ftp_deploy.py \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA" \
            --expected-file-count "$EXPECTED_FILE_COUNT" \
            --approved-plan-token "$APPROVED_PLAN_TOKEN" \
            --confirm-production "$PRODUCTION_CONFIRMATION" | tee deploy-result.txt
          cat deploy-result.txt >> "$GITHUB_STEP_SUMMARY"
